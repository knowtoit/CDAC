<!-- Design and implement a web page that displays a live scoreboard. Use AJAX
(XMLHttpRequest) to retrieve and interpret JSON data from a URL provided by the faculty. -->




<!DOCTYPE html>
<html lang="en">
<head>
    <title>Live Score Board</title>
    <style>
        body{
    font-family: Arial;
    text-align:center;
}

table{
    margin:auto;
    border-collapse: collapse;
    width:60%;
}

th,td{
    border:1px solid black;
    padding:10px;
}

th{
    background-color:#333;
    color:white;
}
    </style>
</head>
<body>
    <h2> Live Score </h2>
    <table id="score">
        <tr>
            <th>Team</th>
            <th>Score</th>
        </tr>
    </table>

    <script>
        function loadScore(){
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "https://jsonplaceholder.typicode.com/users", true);

            xhr.onload = function(){
                if(xhr.status == 200){
                    var data = JSON.parse(xhr.responseText);

                    var events = data;

                    var table = document.getElementById("score");

                    for(var i=0; i<events.length; i++){
                        var row = table.insertRow();

                        row.insertCell(0).innerHTML = data[i].id;
                        row.insertCell(1).innerHTML = data[i].name
                    }
                }
            };
            xhr.send();
        }

        loadScore();

        setInterval(function(){
            location.reload()
        },10000);
    </script>
</body>
</html>
